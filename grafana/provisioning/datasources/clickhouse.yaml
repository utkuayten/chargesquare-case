apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: chargesquare-clickhouse
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 9000
      username: default
      defaultDatabase: chargesquare
      protocol: native
    secureJsonData:
      password: ""
    editable: true
