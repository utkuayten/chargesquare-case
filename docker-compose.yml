# ChargeSquare EV Charging Data Pipeline
# Services: Kafka (KRaft), Redis, ClickHouse, Kafka UI

services:

  # ─────────────────────────────────────────────────────────
  # Kafka (KRaft mode — no ZooKeeper)
  # ─────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: chargesquare-kafka
    ports:
      - "9094:9094"   # external access from host
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      # Three listeners: internal docker, external host, controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Performance tuning
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_LOG_SEGMENT_BYTES=536870912
      - KAFKA_MESSAGE_MAX_BYTES=10485760
      - KAFKA_REPLICA_FETCH_MAX_BYTES=10485760
      - KAFKA_NUM_IO_THREADS=8
      - KAFKA_NUM_NETWORK_THREADS=8
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Topic initializer — runs once on startup
  kafka-init:
    image: apache/kafka:3.8.0
    container_name: chargesquare-kafka-init
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic charging-events \
          --partitions 12 \
          --replication-factor 1 \
          --config retention.ms=86400000 \
          --config compression.type=snappy &&
        /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
          --bootstrap-server kafka:9092 \
          --topic station-status \
          --partitions 4 \
          --replication-factor 1 &&
        echo '✓ Kafka topics created'
      "
    restart: on-failure

  # ─────────────────────────────────────────────────────────
  # Redis — real-time operational store
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chargesquare-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────
  # ClickHouse — analytics store
  # ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.11
    container_name: chargesquare-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/init_clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - CLICKHOUSE_DB=chargesquare
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────
  # Kafka UI — web console for topic inspection
  # ─────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chargesquare-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=chargesquare
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka_data:
  redis_data:
  clickhouse_data:
